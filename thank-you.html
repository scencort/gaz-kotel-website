<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Спасибо за заказ в магазине Газ-Котёл." />
  <title>Газ-Котёл | Спасибо за заказ</title>
  <link rel="icon" type="image/svg+xml" href="images/logo-boiler.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/thank-you.css" />
</head>
<body>
  <header>
    <h1 class="site-brand">
      <a href="index.html" class="brand-link" aria-label="На главную">
        <img src="images/logo-boiler.svg" alt="Логотип Газ-Котёл" class="brand-logo" />
        <span>Газ-Котёл</span>
      </a>
    </h1>
    <nav>
      <a href="index.html">Главная</a>
      <a href="catalog.html">Каталог</a>
      <a href="favorites.html">Избранное</a>
      <a href="about.html">О нас</a>
      <a href="contacts.html">Контакты</a>

    <a href="cart.html" class="cart-icon" title="Корзина">
      <img src="images/cart.svg" alt="Корзина" />

  <main>
    <section class="thank-card">
      <div class="success-icon" aria-hidden="true">

      <h2>Спасибо за заказ!</h2>
      <p id="thankMessage">Мы получили ваш заказ и скоро свяжемся с вами.</p>
      <div class="order-meta" id="orderMeta"></div>
      <div class="actions">
        <a class="btn btn-primary" href="catalog.html">Вернуться в каталог</a>
        <a class="btn btn-details" href="index.html">На главную</a>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Газ-Котёл. Все права защищены.</p>
  </footer>

  <script src="js/common.js"></script>
  <script src="js/thank-you.js"></script>

</html>
