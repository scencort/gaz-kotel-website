<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Корзина магазина Газ-Котёл: проверка выбранных товаров и оформление заказа." />
  <title>Газ-Котёл | Корзина</title>
  <link rel="icon" type="image/svg+xml" href="images/logo-boiler.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <header data-aos="fade-down">
    <h1 class="site-brand">
      <a href="index.html" class="brand-link" aria-label="На главную">
        <img src="images/logo-boiler.svg" alt="Логотип Газ-Котёл" class="brand-logo" />
        <span>Газ-Котёл</span>
      </a>
    </h1>
    <nav>
      <a href="index.html">Главная</a>
      <a href="catalog.html">Каталог</a>
      <a href="favorites.html">Избранное</a>
      <a href="about.html">О нас</a>
      <a href="contacts.html">Контакты</a>
      <a href="admin.html">Заказы</a>
    </nav>
    <a href="cart.html" class="cart-icon" title="Корзина">
      <img src="images/korzina.png" alt="Корзина" />
    </a>
  </header>

  <main>
    <h2 data-aos="fade-up">Ваша корзина</h2>
    <div class="cart-container" id="cart-container" data-aos="fade-up" data-aos-delay="90"></div>

    <section class="promo-panel" data-aos="fade-up" data-aos-delay="105">
      <label for="promoCode">Промокод</label>
      <div class="promo-row">
        <input type="text" id="promoCode" placeholder="Например: TEPLO10" />
        <button type="button" id="applyPromoBtn">Применить</button>
      </div>
      <p id="promoStatus" aria-live="polite"></p>
    </section>

    <section class="summary-panel" id="cart-total" data-aos="fade-up" data-aos-delay="115"></section>

    <form id="order-form" data-aos="fade-up" data-aos-delay="130">
      <input type="text" id="name" placeholder="Ваше имя" required />
      <input type="tel" id="phone" placeholder="Телефон" required />
      <input type="email" id="email" placeholder="Email" required />
      <input type="text" id="telegram" placeholder="Telegram (@username)" />
    </form>

    <button id="checkout-btn">Оформить заказ</button>
    <p id="order-status" aria-live="polite"></p>
  </main>

  <footer data-aos="fade-up" data-aos-delay="170">
    <p>&copy; 2026 Газ-Котёл. Все права защищены.</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
