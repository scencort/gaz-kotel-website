<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Каталог газовых котлов. Широкий выбор моделей для дома и бизнеса.">
  <title>Газ-Котёл | Каталог</title>
  <link rel="icon" type="image/svg+xml" href="images/logo-boiler.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body>
  <header data-aos="fade-down">
    <h1 class="site-brand">
      <a href="index.html" class="brand-link" aria-label="На главную">
        <img src="images/logo-boiler.svg" alt="Логотип Газ-Котёл" class="brand-logo">
        <span>Газ-Котёл</span>
      </a>
    </h1>
    <nav>
      <a href="index.html">Главная</a>
      <a href="catalog.html" class="active">Каталог</a>
      <a href="favorites.html">Избранное</a>
      <a href="about.html">О нас</a>
      <a href="contacts.html">Контакты</a>
      <a href="admin.html">Заказы</a>
    </nav>
    <div class="cart-icon">
      <a href="cart.html" title="Корзина">
        <img src="images/korzina.png" alt="Корзина">
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </header>

  <main>
    <h2 data-aos="fade-up">Каталог газовых котлов</h2>
    <section class="catalog-controls" data-aos="fade-up" data-aos-delay="70">
      <div class="controls-grid">
        <label class="control-field">
          <span>Поиск</span>
          <input type="search" id="searchInput" placeholder="Название или характеристика">
        </label>

        <label class="control-field">
          <span>Цена до</span>
          <select id="priceFilter">
            <option value="">Любая</option>
            <option value="40000">до 40 000 ₽</option>
            <option value="60000">до 60 000 ₽</option>
            <option value="80000">до 80 000 ₽</option>
          </select>
        </label>

        <label class="control-field">
          <span>Мощность</span>
          <select id="powerFilter">
            <option value="">Любая</option>
            <option value="20">до 20 кВт</option>
            <option value="35">до 35 кВт</option>
            <option value="100">35+ кВт</option>
          </select>
        </label>

        <label class="control-field">
          <span>Площадь обогрева</span>
          <select id="areaFilter">
            <option value="">Любая</option>
            <option value="150">до 150 м²</option>
            <option value="300">до 300 м²</option>
            <option value="999">300+ м²</option>
          </select>
        </label>

        <label class="control-field">
          <span>Сортировка</span>
          <select id="sortSelect">
            <option value="popular">По популярности</option>
            <option value="priceAsc">Цена: по возрастанию</option>
            <option value="priceDesc">Цена: по убыванию</option>
            <option value="nameAsc">По названию</option>
          </select>
        </label>

        <button type="button" id="resetFilters" class="btn btn-details btn-reset">Сбросить</button>
      </div>
    </section>
    <section class="product-list" id="productList" data-aos="fade-up" data-aos-delay="100">
      <!-- Товары будут добавлены через JavaScript -->
    </section>
  </main>

  <footer data-aos="fade-up" data-aos-delay="200">
    <p>&copy; 2026 Газ-Котёл. Все права защищены.</p>
  </footer>

  <div class="toast" id="toast">
    <span class="toast-icon">✓</span>
    <span id="toastMessage">Товар добавлен в корзину!</span>
  </div>

  <div class="quick-view" id="quickView" aria-hidden="true">
    <div class="quick-view-backdrop" id="quickViewBackdrop"></div>
    <div class="quick-view-card" role="dialog" aria-modal="true" aria-labelledby="quickViewTitle">
      <button type="button" class="quick-close" id="quickClose" aria-label="Закрыть">×</button>
      <img id="quickImage" src="" alt="">
      <h3 id="quickViewTitle"></h3>
      <p id="quickDescription"></p>
      <div class="quick-price" id="quickPrice"></div>
      <div class="quick-actions">
        <a href="#" class="btn btn-details" id="quickDetailsLink">Открыть карточку</a>
        <button type="button" class="btn btn-cart" id="quickAddBtn">В корзину</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="js/products.js"></script>
  <script src="js/common.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
